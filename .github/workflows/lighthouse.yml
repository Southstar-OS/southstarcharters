name: Lighthouse Audit

on:
  # Run after production deploys
  workflow_run:
    workflows: ["Deploy to Vercel"]
    types: [completed]
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit production site
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://southstarchartersnj.com/
            https://southstarchartersnj.com/harbor-tours
            https://southstarchartersnj.com/fishing-charters
            https://southstarchartersnj.com/contact
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30
